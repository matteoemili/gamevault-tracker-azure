name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
      - CORS-setup
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main
      - multi-instance
  workflow_dispatch:
    inputs:
      instance_id:
        description: 'Instance ID for deployment (leave empty to generate new, or provide existing ID to redeploy)'
        required: false
        type: string
        default: ''
      environment:
        description: 'Environment to deploy'
        required: false
        type: choice
        options:
          - prod
          - dev
          - staging
        default: 'prod'

# Environment variables for infrastructure deployment
env:
  AZURE_LOCATION: westeurope
  BICEP_FILE: infra/main.bicep

jobs:
  # ============================================================================
  # Infrastructure Deployment Job
  # ============================================================================
  deploy_infrastructure:
    if: github.event_name != 'pull_request' || github.event.action != 'closed' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    name: Deploy Infrastructure
    outputs:
      instanceId: ${{ steps.set_instance.outputs.instanceId }}
      resourceGroup: ${{ steps.set_instance.outputs.resourceGroup }}
      storageAccountName: ${{ steps.deploy.outputs.storageAccountName }}
      staticWebAppName: ${{ steps.deploy.outputs.staticWebAppName }}
      staticWebAppUrl: ${{ steps.deploy.outputs.staticWebAppUrl }}
      gamesTableName: ${{ steps.deploy.outputs.gamesTableName }}
      categoriesTableName: ${{ steps.deploy.outputs.categoriesTableName }}
    steps:
      - uses: actions/checkout@v4

      - name: Determine Instance ID and Environment
        id: set_instance
        run: |
          # Determine environment
          EVENT_NAME="${{ github.event_name }}"
          if [ "$EVENT_NAME" == "workflow_dispatch" ]; then
            ENVIRONMENT="${{ inputs.environment }}"
            INPUT_INSTANCE_ID="${{ inputs.instance_id }}"
          elif [ "$EVENT_NAME" == "pull_request" ]; then
            ENVIRONMENT="pr"
            INPUT_INSTANCE_ID="pr${{ github.event.pull_request.number }}"
          else
            ENVIRONMENT="prod"
            INPUT_INSTANCE_ID=""
          fi
          
          echo "Environment: $ENVIRONMENT"
          
          # Determine instance ID
          if [ -n "$INPUT_INSTANCE_ID" ]; then
            # Use provided instance ID (for redeployment)
            INSTANCE_ID="$INPUT_INSTANCE_ID"
            echo "♻️  Redeploying to existing instance: $INSTANCE_ID"
          else
            # Generate new instance ID (8 character random alphanumeric, lowercase)
            INSTANCE_ID=$(openssl rand -hex 4)
            echo "🆕 Generated new instance ID: $INSTANCE_ID"
          fi
          
          # Set resource group name
          RESOURCE_GROUP="rg-gamevault-${INSTANCE_ID}"
          
          echo "instanceId=$INSTANCE_ID" >> $GITHUB_OUTPUT
          echo "resourceGroup=$RESOURCE_GROUP" >> $GITHUB_OUTPUT
          echo "environment=$ENVIRONMENT" >> $GITHUB_OUTPUT
          
          # Set environment for subsequent steps
          echo "AZURE_RESOURCE_GROUP=$RESOURCE_GROUP" >> $GITHUB_ENV
          echo "DEPLOYMENT_ENVIRONMENT=$ENVIRONMENT" >> $GITHUB_ENV
          echo "INSTANCE_ID=$INSTANCE_ID" >> $GITHUB_ENV
          
          # Determine bicep params file
          if [ "$ENVIRONMENT" == "dev" ] || [ "$ENVIRONMENT" == "pr" ]; then
            echo "BICEP_PARAMS_FILE=infra/main.dev.bicepparam" >> $GITHUB_ENV
          elif [ "$ENVIRONMENT" == "staging" ]; then
            echo "BICEP_PARAMS_FILE=infra/main.staging.bicepparam" >> $GITHUB_ENV
          else
            echo "BICEP_PARAMS_FILE=infra/main.bicepparam" >> $GITHUB_ENV
          fi

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS_SPONSORSHIP }}

      - name: Create Resource Group
        run: |
          echo "📦 Creating resource group: ${{ env.AZURE_RESOURCE_GROUP }}"
          az group create \
            --name ${{ env.AZURE_RESOURCE_GROUP }} \
            --location ${{ env.AZURE_LOCATION }} \
            --tags \
              application="GameVault Tracker" \
              environment="${{ env.DEPLOYMENT_ENVIRONMENT }}" \
              managedBy="GitHub Actions" \
              instanceId="${{ env.INSTANCE_ID }}"
          echo "✅ Resource group created"

      - name: Deploy Infrastructure
        id: deploy
        run: |
          echo "🚀 Deploying infrastructure..."
          echo "Instance ID: ${{ env.INSTANCE_ID }}"
          echo "Environment: ${{ env.DEPLOYMENT_ENVIRONMENT }}"
          echo "Resource Group: ${{ env.AZURE_RESOURCE_GROUP }}"
          echo "Params File: ${{ env.BICEP_PARAMS_FILE }}"
          
          DEPLOYMENT_OUTPUT=$(az deployment group create \
            --name "gamevault-${{ github.run_number }}" \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --template-file ${{ env.BICEP_FILE }} \
            --parameters ${{ env.BICEP_PARAMS_FILE }} \
            --parameters instanceId=${{ env.INSTANCE_ID }} \
            --query 'properties.outputs' \
            --output json)
          
          echo "📊 Deployment outputs:"
          echo "$DEPLOYMENT_OUTPUT" | jq '.'
          
          # Extract outputs for subsequent jobs
          echo "instanceId=$(echo $DEPLOYMENT_OUTPUT | jq -r '.instanceId.value')" >> $GITHUB_OUTPUT
          echo "storageAccountName=$(echo $DEPLOYMENT_OUTPUT | jq -r '.storageAccountName.value')" >> $GITHUB_OUTPUT
          echo "staticWebAppName=$(echo $DEPLOYMENT_OUTPUT | jq -r '.staticWebAppName.value')" >> $GITHUB_OUTPUT
          echo "staticWebAppUrl=$(echo $DEPLOYMENT_OUTPUT | jq -r '.staticWebAppUrl.value')" >> $GITHUB_OUTPUT
          echo "gamesTableName=$(echo $DEPLOYMENT_OUTPUT | jq -r '.gamesTableName.value')" >> $GITHUB_OUTPUT
          echo "categoriesTableName=$(echo $DEPLOYMENT_OUTPUT | jq -r '.categoriesTableName.value')" >> $GITHUB_OUTPUT
          
          echo "✅ Infrastructure deployed successfully"

      - name: Configure Storage CORS
        run: |
          STORAGE_ACCOUNT="${{ steps.deploy.outputs.storageAccountName }}"
          WEB_APP_URL="${{ steps.deploy.outputs.staticWebAppUrl }}"
          
          echo "🌐 Configuring CORS for Table Service..."
          echo "Storage Account: $STORAGE_ACCOUNT"
          echo "Allowed Origin: $WEB_APP_URL"
          
          az storage cors add \
            --account-name "$STORAGE_ACCOUNT" \
            --services t \
            --methods GET POST PUT DELETE OPTIONS PATCH \
            --origins "$WEB_APP_URL" \
            --allowed-headers "*" \
            --exposed-headers "*" \
            --max-age 3600
          
          echo "✅ CORS configured successfully"

      - name: Display Deployment Summary
        run: |
          echo "=================================================="
          echo "🎉 Deployment Complete!"
          echo "=================================================="
          echo ""
          echo "📋 Instance Details:"
          echo "  Instance ID:     ${{ steps.deploy.outputs.instanceId }}"
          echo "  Resource Group:  ${{ env.AZURE_RESOURCE_GROUP }}"
          echo "  Environment:     ${{ env.DEPLOYMENT_ENVIRONMENT }}"
          echo ""
          echo "🌐 Resources:"
          echo "  Static Web App:  ${{ steps.deploy.outputs.staticWebAppName }}"
          echo "  Storage Account: ${{ steps.deploy.outputs.storageAccountName }}"
          echo "  Web App URL:     ${{ steps.deploy.outputs.staticWebAppUrl }}"
          echo ""
          echo "♻️  To redeploy to this instance:"
          echo "  Use Instance ID: ${{ steps.deploy.outputs.instanceId }}"
          echo ""
          echo "=================================================="

  # ============================================================================
  # Build and Deploy Application Job
  # ============================================================================
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    needs: deploy_infrastructure
    env:
      STATIC_WEB_APP: ${{ needs.deploy_infrastructure.outputs.staticWebAppName }}
      STORAGE_ACCOUNT: ${{ needs.deploy_infrastructure.outputs.storageAccountName }}
      AZURE_RESOURCE_GROUP: ${{ needs.deploy_infrastructure.outputs.resourceGroup }}

    steps:
        
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS_SPONSORSHIP }}

      - name: Generate SAS Token
        id: generate_sas
        run: |
          STORAGE_ACCOUNT="${{ env.STORAGE_ACCOUNT }}"
          
          echo "🔑 Retrieving storage account key..."
          ACCOUNT_KEY=$(az storage account keys list \
            --account-name "$STORAGE_ACCOUNT" \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
            --query '[0].value' \
            --output tsv)
          
          if [ -z "$ACCOUNT_KEY" ]; then
            echo "❌ Failed to retrieve storage account key"
            exit 1
          fi
          
          echo "✅ Storage account key retrieved"
          
          # Calculate expiry date (1 year from now)
          EXPIRY=$(date -u -v+1y '+%Y-%m-%dT%H:%M:%SZ' 2>/dev/null || date -u -d '+1 year' '+%Y-%m-%dT%H:%M:%SZ')
          
          echo "🔐 Generating SAS token (valid until $EXPIRY)..."
          # Generate SAS token with table permissions (Read, Add, Update, Delete)
          SAS_TOKEN=$(az storage account generate-sas \
            --account-name "$STORAGE_ACCOUNT" \
            --account-key "$ACCOUNT_KEY" \
            --services t \
            --resource-types sco \
            --permissions raud \
            --expiry "$EXPIRY" \
            --https-only \
            --output tsv)
          
          if [ -z "$SAS_TOKEN" ]; then
            echo "❌ Failed to generate SAS token"
            exit 1
          fi
          
          echo "✅ SAS token generated successfully (length: ${#SAS_TOKEN} characters)"
          echo "sas_token=$SAS_TOKEN" >> $GITHUB_OUTPUT

      - name: Get SWA Deployment Token
        id: get_token
        run: |
          SWA_NAME="${{ env.STATIC_WEB_APP }}"
          RG_NAME="${{ env.AZURE_RESOURCE_GROUP }}"
          TOKEN=$(az staticwebapp secrets list --name $SWA_NAME --resource-group $RG_NAME --query "properties.apiKey" -o tsv)
          echo "::add-mask::$TOKEN"
          echo "swa_token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Debug Environment Variables
        run: |
          echo "🔍 Environment variables being passed to build:"
          echo "VITE_AZURE_STORAGE_ACCOUNT_NAME: ${{ needs.deploy_infrastructure.outputs.storageAccountName }}"
          echo "VITE_AZURE_GAMES_TABLE_NAME: ${{ needs.deploy_infrastructure.outputs.gamesTableName }}"
          echo "VITE_AZURE_CATEGORIES_TABLE_NAME: ${{ needs.deploy_infrastructure.outputs.categoriesTableName }}"
          echo "SAS Token length: ${#SAS_TOKEN}"
        env:
          SAS_TOKEN: ${{ steps.generate_sas.outputs.sas_token }}

      - name: Create Production Environment File
        run: |
          echo "📝 Creating .env.production file..."
          cat > .env.production << EOF
          VITE_AZURE_STORAGE_ACCOUNT_NAME=${{ needs.deploy_infrastructure.outputs.storageAccountName }}
          VITE_AZURE_STORAGE_SAS_TOKEN=${{ steps.generate_sas.outputs.sas_token }}
          VITE_AZURE_GAMES_TABLE_NAME=${{ needs.deploy_infrastructure.outputs.gamesTableName }}
          VITE_AZURE_CATEGORIES_TABLE_NAME=${{ needs.deploy_infrastructure.outputs.categoriesTableName }}
          EOF
          echo "✅ .env.production created"

      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ steps.get_token.outputs.swa_token }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          ###### Repository/Build Configurations ######
          app_location: "/"
          api_location: ""
          output_location: "dist"
          ###### End of Repository/Build Configurations ######

      - name: Configure Static Web App Settings
        run: |
          echo "🔧 Configuring Static Web App application settings..."
          az staticwebapp appsettings set \
            --name "${{ env.STATIC_WEB_APP }}" \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
            --setting-names \
              VITE_AZURE_STORAGE_ACCOUNT_NAME="${{ needs.deploy_infrastructure.outputs.storageAccountName }}" \
              VITE_AZURE_STORAGE_SAS_TOKEN="${{ steps.generate_sas.outputs.sas_token }}" \
              VITE_AZURE_GAMES_TABLE_NAME="${{ needs.deploy_infrastructure.outputs.gamesTableName }}" \
              VITE_AZURE_CATEGORIES_TABLE_NAME="${{ needs.deploy_infrastructure.outputs.categoriesTableName }}"
          echo "✅ Application settings configured"

  # ============================================================================
  # Close Pull Request Job
  # ============================================================================
  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Determine PR Instance
        id: pr_instance
        run: |
          INSTANCE_ID="pr${{ github.event.pull_request.number }}"
          RESOURCE_GROUP="rg-gamevault-${INSTANCE_ID}"
          echo "instanceId=$INSTANCE_ID" >> $GITHUB_OUTPUT
          echo "resourceGroup=$RESOURCE_GROUP" >> $GITHUB_OUTPUT

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS_SPONSORSHIP }}

      - name: Find and Close Staging Environment
        id: find_swa
        run: |
          RESOURCE_GROUP="${{ steps.pr_instance.outputs.resourceGroup }}"
          if [ -z "$RESOURCE_GROUP" ]; then
            echo "No resource group determined. Skipping."
            echo "found=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          if az group exists --name "$RESOURCE_GROUP" | grep -q "true"; then
            SWA_NAME=$(az staticwebapp list --resource-group $RESOURCE_GROUP --query "[0].name" -o tsv 2>/dev/null || echo "")
            
            if [ -n "$SWA_NAME" ]; then
              echo "Found Static Web App: $SWA_NAME"
              TOKEN=$(az staticwebapp secrets list --name $SWA_NAME --resource-group $RESOURCE_GROUP --query "properties.apiKey" -o tsv)
              echo "::add-mask::$TOKEN"
              echo "swa_token=$TOKEN" >> $GITHUB_OUTPUT
              echo "found=true" >> $GITHUB_OUTPUT
            else
              echo "No Static Web App found in resource group"
              echo "found=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "Resource group not found, skipping"
            echo "found=false" >> $GITHUB_OUTPUT
          fi

      - name: Close Pull Request
        if: steps.find_swa.outputs.found == 'true'
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ steps.find_swa.outputs.swa_token }}
          action: "close"

      - name: Delete PR Resource Group
        if: steps.pr_instance.outputs.resourceGroup != ''
        run: |
          RESOURCE_GROUP="${{ steps.pr_instance.outputs.resourceGroup }}"
          if az group exists --name "$RESOURCE_GROUP" | grep -q "true"; then
            echo "Deleting resource group $RESOURCE_GROUP..."
            az group delete --name "$RESOURCE_GROUP" --yes --no-wait
          else
            echo "Resource group $RESOURCE_GROUP already deleted."
          fi
