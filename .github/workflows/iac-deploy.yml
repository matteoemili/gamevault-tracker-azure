# GENERATED BY GITHUB COPILOT
name: Deploy Infrastructure

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        type: choice
        options:
          - dev
          - test
          - prod
      action:
        description: 'Action to perform'
        required: true
        type: choice
        default: 'deploy'
        options:
          - deploy
          - validate
          - what-if
          - teardown
      location:
        description: 'Azure region (leave empty for default)'
        required: false
        type: string
        default: 'eastus'

permissions:
  contents: read
  id-token: write

jobs:
  infrastructure:
    name: ${{ github.event.inputs.action }} - ${{ github.event.inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Azure CLI
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Verify Azure login
        run: |
          az account show
          az account set --subscription ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set environment variables
        run: |
          echo "RESOURCE_GROUP=rg-gamevault-${{ github.event.inputs.environment }}" >> $GITHUB_ENV
          echo "ENVIRONMENT=${{ github.event.inputs.environment }}" >> $GITHUB_ENV
          echo "LOCATION=${{ github.event.inputs.location }}" >> $GITHUB_ENV

      - name: Deploy Infrastructure
        if: github.event.inputs.action == 'deploy'
        run: |
          chmod +x ./infra/scripts/deploy.sh
          ./infra/scripts/deploy.sh \
            --environment ${{ env.ENVIRONMENT }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --location ${{ env.LOCATION }} \
            --token ${{ secrets.GITHUB_TOKEN }}

      - name: Validate Template
        if: github.event.inputs.action == 'validate'
        run: |
          chmod +x ./infra/scripts/deploy.sh
          ./infra/scripts/deploy.sh \
            --environment ${{ env.ENVIRONMENT }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --location ${{ env.LOCATION }} \
            --validate

      - name: What-If Analysis
        if: github.event.inputs.action == 'what-if'
        run: |
          chmod +x ./infra/scripts/deploy.sh
          ./infra/scripts/deploy.sh \
            --environment ${{ env.ENVIRONMENT }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --location ${{ env.LOCATION }} \
            --what-if

      - name: Teardown Infrastructure
        if: github.event.inputs.action == 'teardown'
        run: |
          chmod +x ./infra/scripts/teardown.sh
          ./infra/scripts/teardown.sh \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --force

      - name: Upload Deployment Output
        if: github.event.inputs.action == 'deploy'
        uses: actions/upload-artifact@v3
        with:
          name: deployment-output-${{ github.event.inputs.environment }}
          path: infra/deployment-output.json
          retention-days: 30

      - name: Upload Environment Config
        if: github.event.inputs.action == 'deploy'
        uses: actions/upload-artifact@v3
        with:
          name: env-config-${{ github.event.inputs.environment }}
          path: infra/.env.${{ github.event.inputs.environment }}
          retention-days: 30

      - name: Deployment Summary
        if: github.event.inputs.action == 'deploy'
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: ${{ github.event.inputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Resource Group**: ${{ env.RESOURCE_GROUP }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Location**: ${{ env.LOCATION }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ -f infra/deployment-output.json ]; then
            STORAGE_ACCOUNT=$(jq -r '.properties.outputs.storageAccountName.value' infra/deployment-output.json)
            STATIC_WEB_APP=$(jq -r '.properties.outputs.staticWebAppName.value' infra/deployment-output.json)
            APP_URL=$(jq -r '.properties.outputs.staticWebAppUrl.value' infra/deployment-output.json)
            
            echo "### Deployed Resources" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "- **Storage Account**: \`$STORAGE_ACCOUNT\`" >> $GITHUB_STEP_SUMMARY
            echo "- **Static Web App**: \`$STATIC_WEB_APP\`" >> $GITHUB_STEP_SUMMARY
            echo "- **Application URL**: https://$APP_URL" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Next Steps" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "1. Update CORS settings: \`./infra/scripts/update-cors.sh -g ${{ env.RESOURCE_GROUP }} -s $STORAGE_ACCOUNT -o https://$APP_URL\`" >> $GITHUB_STEP_SUMMARY
            echo "2. Configure GitHub Secrets for CI/CD" >> $GITHUB_STEP_SUMMARY
            echo "3. Download deployment artifacts for environment configuration" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Logout from Azure
        if: always()
        run: |
          az logout || true
